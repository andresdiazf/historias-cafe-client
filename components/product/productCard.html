<article class="card">

    <img src="" alt="" class="product-image" onerror="this.src='/assets/img/iconoPepitaCafe-dark.svg'">
  </div>
  <div class="card-content">
    <h3 class="product-name"></h3>
    <p class="finca product-origin"></p>
